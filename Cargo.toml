[package]
name = "fjall-typed-keyspace"
version = "0.1.0"
edition = "2024"

[dependencies]
byteorder = "1.5.0"
byteview = "0.10.1"
facet = { version = "0.44.3", optional = true }
facet-format = { version = "0.44.5", optional = true }
facet-json = { version = "0.44.5", optional = true }
fjall = "3.1.2"
thiserror = "2.0.18"

[features]
default = ["facet_json"]
facet_json = ["facet-json", "facet-format", "facet"]
